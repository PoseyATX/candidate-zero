name: CI

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Vite 8 requires Node ^20.19.0 || >=22.12.0; pin 22 to stay clear
          # of the 20.x floor rather than trust "20" to resolve above it.
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run harness suite
        run: npm run harness

      - name: Build (catches broken/orphaned index.html, missing UI bundle, etc.)
        run: npm run build

      - name: Build headless engine bundle (host/Unity binding artifact)
        run: npm run build:engine

      - name: Install Playwright browser (for UI smoke)
        run: npx playwright install --with-deps chromium

      - name: UI smoke test (drives the real built app; catches dead buttons, stuck modals, console errors)
        run: npm run smoke:ui

      - name: Accessibility audit (axe-core WCAG 2 A/AA; fails on any critical/serious)
        run: npm run a11y
