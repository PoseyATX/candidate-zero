name: CI

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Vite 8 requires Node ^20.19.0 || >=22.12.0; pin 22 to stay clear
          # of the 20.x floor rather than trust "20" to resolve above it.
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run harness suite
        run: npm run harness

      - name: Build (catches broken/orphaned index.html, missing UI bundle, etc.)
        run: npm run build
