name: Deploy to GitHub Pages

on:
  push:
    # GitHub branch matching is case-sensitive; the actual branch is
    # "fable-build" (lowercase, confirmed via `git ls-remote`). The
    # capitalized form here meant this trigger never matched a real push --
    # deploy.yml has only ever run once, manually, since it was added.
    branches: [ fable-build ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Vite 8 requires Node ^20.19.0 || >=22.12.0; pin 22 to stay clear
          # of the 20.x floor rather than trust "20" to resolve above it.
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
