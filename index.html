<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Candidate Zero — Primary</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="app">
      <header class="top">
        <div>
          <p class="eyebrow">A Hot Texas Primary</p>
          <h1>Candidate Zero</h1>
        </div>
        <div class="top-actions">
          <label class="seed-label">Seed <input id="seed-input" type="number" min="0" step="1" /></label>
          <button type="button" id="btn-new" class="btn">New run</button>
        </div>
      </header>
      <section id="setup" class="setup panel">
        <h2>Identity — choices bind</h2>
        <div class="setup-grid">
          <label>Persona
            <select id="sel-persona"></select>
          </label>
          <label>Issue
            <select id="sel-issue"></select>
          </label>
          <label>District
            <select id="sel-district"></select>
          </label>
          <label>Region
            <select id="sel-region"></select>
          </label>
        </div>
        <p id="setup-blurb" class="hint"></p>
        <button type="button" id="btn-start" class="btn btn-gold">Begin primary</button>
      </section>
      <section id="game" class="game hidden">
        <section id="ledger" class="ledger" aria-live="polite"></section>
        <section class="panels">
          <div class="panel">
            <h2>Actions</h2>
            <p id="week-hint" class="hint"></p>
            <div id="juice" class="juice-banner hidden" aria-live="assertive"></div>
            <div id="draft" class="card-grid"></div>
            <div id="playables" class="card-grid"></div>
            <div class="row-actions">
              <button type="button" id="btn-end" class="btn btn-gold">End week</button>
              <button type="button" id="btn-restart" class="btn btn-gold hidden">Start a new run</button>
            </div>
          </div>
          <div class="panel">
            <h2>Log</h2>
            <div id="log" class="log" role="log"></div>
          </div>
        </section>
      </section>
      <footer class="foot">
        <span>Pure engine shell · not v0.1</span>
        <span>Primary 8w · General 6w · SAFE never disasters</span>
      </footer>
    </div>
    <script type="module" src="/src/ui/main.ts"></script>
  </body>
</html>
